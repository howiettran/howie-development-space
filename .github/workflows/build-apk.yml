name: Build Howie Translate APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build test APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Rename APK
        run: |
          mkdir -p finished-apk
          cp app/build/outputs/apk/debug/app-debug.apk finished-apk/Howie-Translate-v0.9.1-test.apk

      - name: Upload finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Howie-Translate-v0.9.1-test-APK
          path: finished-apk/Howie-Translate-v0.9.1-test.apk
          if-no-files-found: error
          retention-days: 30
